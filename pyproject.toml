[project]
name = "filefinder"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = ["PySide6>=6.8"]

[project.scripts]
filefinder = "filefinder.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/filefinder"]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "COM812", "ISC001"]

[tool.ruff.lint.per-file-ignores]
"src/filefinder/app.py" = ["S603", "S607"]

[tool.ty.environment]
python-version = "3.14"

[dependency-groups]
dev = ["ruff>=0.11", "ty>=0.0.37"]
