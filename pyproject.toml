[project]
name = "filefinder"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = ["PySide6>=6.8"]

[project.scripts]
filefinder = "filefinder.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/filefinder"]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "COM812", "ISC001"]

[tool.ruff.lint.per-file-ignores]
"src/filefinder/app.py" = ["S603", "S607"]
"tests/**/*.py" = ["S101", "PLR2004", "SLF001", "INP001", "ANN", "TC002", "PLW0108"]

[tool.ty.environment]
python-version = "3.14"

[tool.pytest.ini_options]
qt_api = "pyside6"
testpaths = ["tests"]

[tool.coverage.run]
source = ["filefinder"]
omit = ["*/__main__.py"]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__",
]

[dependency-groups]
dev = ["ruff>=0.11", "ty>=0.0.37", "pytest>=9", "pytest-qt>=4.4", "pytest-cov>=6"]
