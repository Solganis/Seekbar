name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv lock --check
      - run: uv sync
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run ty check src/ tests/

  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Install Qt dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0 libx11-6
      - run: uv sync
      - name: Generate coverage config
        shell: python
        run: |
          import sys
          omit = ["*/__main__.py"]
          exclude = ["pragma: no cover", "if TYPE_CHECKING:", "if __name__"]
          if sys.platform != "win32":
              omit += ["*/_mft.py", "*/hotkey.py", "*/_autostart_windows.py"]
              # search.py also carries the Windows-only MFT strategy and drive scan (tested on Windows only)
              exclude += ["class MftSearchStrategy", "_run_with_mft_fallback", "_search_root_mft", "string.ascii_uppercase"]
          if sys.platform != "darwin":
              omit += ["*/_spotlight.py", "*/_autostart_macos.py", "*/_hotkey_macos.py"]
          if sys.platform != "linux":
              omit += ["*/_locate.py", "*/_autostart_linux.py", "*/_hotkey_linux.py"]
          lines = ["[run]", "source = seekbar", "omit ="]
          lines += [f"    {p}" for p in omit]
          lines += ["", "[report]", "show_missing = true", "exclude_lines ="]
          lines += [f"    {p}" for p in exclude]
          with open(".coveragerc", "w") as f:
              f.write("\n".join(lines) + "\n")
      - name: Run tests
        run: uv run pytest tests/ -v --cov --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml --cov-fail-under=100
        env:
          QT_QPA_PLATFORM: offscreen
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: ${{ matrix.os }}
