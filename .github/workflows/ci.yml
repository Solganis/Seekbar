name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run ty check src/

  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install Qt dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0
      - run: uv sync
      - name: Generate coverage config
        shell: python
        run: |
          import sys
          omit = ["*/__main__.py"]
          if sys.platform != "win32":
              omit += ["*/_mft.py", "*/hotkey.py"]
          if sys.platform != "darwin":
              omit.append("*/_spotlight.py")
          if sys.platform != "linux":
              omit.append("*/_locate.py")
          lines = ["[run]", "source = seekbar", "omit ="]
          lines += [f"    {p}" for p in omit]
          lines += ["", "[report]", "show_missing = true", "exclude_lines ="]
          lines += ["    pragma: no cover", "    if TYPE_CHECKING:", "    if __name__"]
          with open(".coveragerc", "w") as f:
              f.write("\n".join(lines) + "\n")
      - name: Run tests
        run: uv run pytest tests/ -v --cov --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=100
        env:
          QT_QPA_PLATFORM: offscreen
