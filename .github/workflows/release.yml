name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows-x64
          - os: macos-latest
            suffix: macos
          - os: ubuntu-latest
            suffix: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install Qt dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0 libx11-6
      - run: uv sync
      - name: Run tests
        run: uv run pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen
      - run: uv run pyinstaller seekbar.spec --distpath dist --workpath build --clean
      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: dist/Seekbar.exe --version
      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: dist/Seekbar --version
      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: dist/Seekbar.app/Contents/MacOS/Seekbar --version
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cd dist && 7z a "../Seekbar-${VERSION}-${SUFFIX}.zip" Seekbar.exe
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: tar -C dist -cf - Seekbar.app | xz -9 > "Seekbar-${VERSION}-${SUFFIX}.tar.xz"
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -C dist -cf - Seekbar | xz -9 > "Seekbar-${VERSION}-${SUFFIX}.tar.xz"
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Seekbar-${{ matrix.suffix }}
          path: |
            *.zip
            *.tar.xz
          retention-days: 3

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # keyless cosign signing + build provenance via Sigstore OIDC
      attestations: write # actions/attest-build-provenance
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Collect archives and checksums
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.xz' \) -exec mv {} release/ \;
          cd release && sha256sum Seekbar-* > SHA256SUMS
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release/Seekbar-*.zip
            release/Seekbar-*.tar.xz
      - name: Export provenance as in-toto bundle
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          jq -c '.dsseEnvelope' "$BUNDLE_PATH" > release/provenance.intoto.jsonl
          test -s release/provenance.intoto.jsonl
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign archives (keyless)
        run: |
          for archive in release/Seekbar-*.zip release/Seekbar-*.tar.xz; do
            cosign sign-blob --yes --bundle "${archive}.sigstore.json" "${archive}"
          done
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Generate SBOMs (CycloneDX)
        run: |
          for archive in release/Seekbar-*.zip release/Seekbar-*.tar.xz; do
            extract="sbom/$(basename "$archive")"
            mkdir -p "$extract"
            case "$archive" in
              *.zip) unzip -q "$archive" -d "$extract" ;;
              *.tar.xz) tar -xf "$archive" -C "$extract" ;;
            esac
            syft scan "dir:$extract" -o "cyclonedx-json=${archive}.sbom.cdx.json"
          done
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: release/*
          generate_release_notes: true
